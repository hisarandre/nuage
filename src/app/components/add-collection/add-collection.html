<div
  class="fixed inset-0 z-40 bg-black/80"
  (click)="onClose()"
></div>

<dialog
  open
  class="fixed left-1/2 top-1/2 z-50 m-0 w-full max-w-md -translate-x-1/2 -translate-y-1/2 rounded-2xl bg-background p-8 shadow-xl"
>
  <div (click)="$event.stopPropagation()">

    <header class="mb-6 flex items-center justify-between">
      <h2 class="text-2xl font-bold">
        {{ isEdit() ? 'Modifier la collection' : 'Nouvelle collection' }}
      </h2>

      <button
        type="button"
        aria-label="Fermer"
        (click)="onClose()"
        class="cursor-pointer rounded-full p-2 w-8 h-8 flex justify-center items-center hover:bg-black/5"
      >
        ✕
      </button>
    </header>


    <!-- Preview -->
    <div
      class="folder-card mx-auto mb-6 w-64 pt-3"
      [style]="cardStyle()"
    >
      <div class="flex h-40 flex-col items-center justify-center gap-2 p-4">
        <span class="text-3xl">
          {{ selectedEmoji() }}
        </span>

        <h3 class="text-lg font-bold">
          {{ name() || 'Ma collection' }}
        </h3>
      </div>
    </div>


    <!-- Nom -->
    <div class="mb-6">
      <label
        for="name"
        class="mb-1 text-sm font-medium"
      >
        Nom
      </label>

      <input
        id="name"
        type="text"
        [(ngModel)]="name"
        placeholder="ex: Vinyles, Livres, Cartes postales..."
      />
    </div>


    <!-- Emoji -->
    <div class="mb-6">
      <label class="mb-2 text-sm font-medium">
        Emoji
      </label>

      <div class="grid grid-cols-8 gap-2">
        @for (emoji of emojis; track emoji) {
          <button
            type="button"
            (click)="selectedEmoji.set(emoji)"
            class="flex h-9 w-9 items-center justify-center rounded-full bg-gray-100 text-lg transition hover:scale-110"
            [class.ring-2]="selectedEmoji() === emoji"
            [class.ring-primary]="selectedEmoji() === emoji"
          >
            {{ emoji }}
          </button>
        }
      </div>
    </div>


    <!-- Couleur -->
    <div class="mb-8">
      <label class="mb-2 block text-sm font-medium">
        Couleur
      </label>

      <div class="flex gap-3">
        @for (color of colors; track color) {
          <button
            type="button"
            (click)="selectedColor.set(color)"
            class="h-8 w-8 rounded-full transition hover:scale-110"
            [style.background]="'var(--' + color + ')'"
            [class.ring-2]="selectedColor() === color"
            [class.ring-primary]="selectedColor() === color"
            [class.ring-offset-2]="selectedColor() === color"
          ></button>
        }
      </div>
    </div>


    <!-- Actions -->
    <div class="flex gap-3">
      <app-button
        class="w-full"
        variant="outline"
        (click)="onClose()"
      >
        Annuler
      </app-button>

      <app-button
        class="w-full"
        (click)="onCreate()"
        [disabled]="saving()">
        {{ isEdit() ? 'Enregistrer' : 'Ajouter' }}
      </app-button>
    </div>

  </div>
</dialog>
